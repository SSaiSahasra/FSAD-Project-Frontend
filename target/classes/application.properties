# H2 Database for development
spring.datasource.url=jdbc:h2:mem:conference_db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# JWT configuration
jwt.secret=5f4dcc3b5aa765d61d8327deb882cf99a826456789abcdef0123456789abcdef
# 24 hours (24 * 60 * 60 * 1000)
jwt.expiration=86400000

# Google OAuth
google.client-id=808610578408-337kuesfper312ni7bcgjjq1ivli40rm.apps.googleusercontent.com

# Swagger/OpenAPI configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# File upload settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.conference.platform=INFO

# Audit fields
spring.jpa.auditing.enabled=true
